<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Musicly - Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <main class="auth-page d-flex justify-content-center">
    <div class="auth-container text-center">

      <h1 class="auth-title">Login</h1>

      <div class="auth-form mt-5">
        <input
          type="text"
          id="username"
          class="form-control auth-input mb-3"
          placeholder="Username"
        >

        <input
          type="password"
          id="password"
          class="form-control auth-input mb-4"
          placeholder="Password"
        >

        <button class="btn auth-login-btn w-100 mb-3" onclick="login()">
          Login
        </button>

        <a href="#" class="forgot-link d-block mb-4">Forgot Password?</a>

        <div class="or-divider mb-4">
          <span>OR</span>
        </div>

        <a href="register.html" class="btn auth-secondary-btn w-100">
          Create New Account
        </a>
      </div>

    </div>
  </main>

  <script src="js/toast.js"></script>
  <script src="js/auth.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <div id="toast" class="toast-notification hidden-toast"></div>
</body>
</html>
