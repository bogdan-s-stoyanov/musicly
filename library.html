<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Musicly - Library</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <main class="search-page-v2">
    <div class="search-container-v2">

      <h1 class="search-title-v2 text-center">Library</h1>

      <div class="search-bar-wrapper-v2">
        <input
          type="text"
          id="librarySearchInput"
          class="search-input-v2"
          placeholder="Search for songs, artists, albums..."
        >
      </div>

      <div class="search-top-actions">
        <button class="top-action-btn" onclick="toggleLibraryFilterMenu()">Filter</button>
        <button class="top-action-btn" onclick="toggleLibrarySortMenu()">Sort</button>
      </div>

      <div id="libraryFilterMenu" class="popup-menu hidden-menu">
        <button onclick="filterLibraryByGenre('All')">All</button>
        <button onclick="filterLibraryByGenre('Pop')">Pop</button>
        <button onclick="filterLibraryByGenre('Rock')">Rock</button>
        <button onclick="filterLibraryByGenre('Hiphop')">Hiphop</button>
      </div>

      <div id="librarySortMenu" class="popup-menu hidden-menu">
        <button onclick="sortLibrarySongs('title')">Name</button>
        <button onclick="sortLibrarySongs('artist')">Artist</button>
        <button onclick="sortLibrarySongs('genre')">Genre</button>
      </div>

      <div id="librarySongsList" class="songs-list-v2"></div>

      <div class="back-btn-wrapper-v2">
        <a href="app.html" class="back-btn-v2">Go Back</a>
      </div>
    </div>

    <div class="sticky-player" id="libraryStickyPlayer">
      <div class="sticky-player-info" id="libraryStickyPlayerInfo">
        No song selected
      </div>
      <audio id="libraryAudioPlayer" controls class="sticky-audio-player"></audio>
    </div>
  </main>

  <script src="js/toast.js"></script>
  <script src="js/library.js"></script>

  <div id="toast" class="toast-notification hidden-toast"></div>
</body>
</html>
