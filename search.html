<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Musicly - Search</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <main class="search-page-v2">
    <div class="search-container-v2">

      <h1 class="search-title-v2 text-center">Search Song</h1>

      <div class="search-bar-wrapper-v2">
        <input
          type="text"
          id="searchInput"
          class="search-input-v2"
          placeholder="Search for songs, artists, albums..."
        >
      </div>

      <div class="search-top-actions">
        <button class="top-action-btn" onclick="toggleFilterMenu()">Filter</button>
        <button class="top-action-btn" onclick="toggleSortMenu()">Sort</button>
      </div>

      <div id="filterMenu" class="popup-menu hidden-menu">
        <button onclick="filterByGenre('All')">All</button>
        <button onclick="filterByGenre('Pop')">Pop</button>
        <button onclick="filterByGenre('Rock')">Rock</button>
        <button onclick="filterByGenre('Hiphop')">Hiphop</button>
      </div>

      <div id="sortMenu" class="popup-menu hidden-menu">
        <button onclick="sortSongs('title')">Name</button>
        <button onclick="sortSongs('artist')">Artist</button>
        <button onclick="sortSongs('genre')">Genre</button>
      </div>

      <div id="songsList" class="songs-list-v2"></div>

      <div class="back-btn-wrapper-v2">
        <a href="app.html" class="back-btn-v2">Go Back</a>
      </div>
       
      
    </div>
      <div class="sticky-player" id="searchStickyPlayer">
        <div class="sticky-player-info" id="searchStickyPlayerInfo">
          No song selected
        </div>
      <audio id="audioPlayer" controls class="sticky-audio-player"></audio>
      </div>
    </div>
  </main>

  <script src="js/toast.js"></script>
  <script src="js/songs.js"></script>
  <script src="js/search.js"></script>

  <div id="toast" class="toast-notification hidden-toast"></div>
</body>
</html>
