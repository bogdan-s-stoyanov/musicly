<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Musicly - Register</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <main class="auth-page d-flex justify-content-center">
    <div class="auth-container text-center">

      <h1 class="auth-title">Create Account</h1>

      <div class="auth-form">
        <input
          type="text"
          id="registerUsername"
          class="form-control auth-input mb-3"
          placeholder="Username"
        >

        <input
          type="password"
          id="registerPassword"
          class="form-control auth-input mb-3"
          placeholder="Password"
        >

        <input
          type="password"
          id="confirmPassword"
          class="form-control auth-input mb-4"
          placeholder="Confirm Password"
        >

        <button class="btn auth-login-btn w-100 mb-3" onclick="registerUser()">
          Sign Up
        </button>

        <a href="login.html" class="btn auth-secondary-btn w-100">
          Back to Login
        </a>
      </div>

    </div>
  </main>

  <script src="js/auth.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
